<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Adaptive Dimmer</h1>

  <label class="row">
    <span>Enabled</span>
    <input type="checkbox" id="enabled" />
  </label>

  <label class="row">
    <span>Sensitivity threshold</span>
    <input type="range" id="threshold" min="0" max="255" step="1" />
    <output id="thresholdVal"></output>
  </label>

  <label class="row">
    <span>Overlay intensity</span>
    <input type="range" id="intensity" min="0" max="1" step="0.05" />
    <output id="intensityVal"></output>
  </label>

  <script src="popup.js"></script>
</body>
</html>
